<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e10e0e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e10e0e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff5a3d" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e10e0e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e10e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>

  <!-- soft red glow behind the chevrons -->
  <circle cx="1050" cy="330" r="420" fill="url(#glowSpot)"/>

  <!-- large "Z" style chevron streaks, echoing the brand banner motif -->
  <g opacity="0.9">
    <polygon points="620,700 760,700 1180,60 1040,60" fill="url(#redGlow)"/>
    <polygon points="760,700 820,700 1240,60 1180,60" fill="#e10e0e" opacity="0.85"/>
  </g>
  <g opacity="0.5">
    <polygon points="380,700 460,700 880,60 800,60" fill="#e10e0e"/>
  </g>

  <!-- thin speed lines -->
  <g stroke="#e10e0e" stroke-width="3" opacity="0.5">
    <line x1="200" y1="600" x2="520" y2="120"/>
    <line x1="260" y1="640" x2="580" y2="160"/>
    <line x1="1280" y1="640" x2="1520" y2="280"/>
    <line x1="1340" y1="680" x2="1560" y2="340"/>
  </g>

  <!-- fine grid texture, low opacity -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
  </g>
</svg>
